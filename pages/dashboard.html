<section>
  <div class="page-header">
    <div>
      <h1>Dashboard</h1>
      <p>Factory performance, orders and cash movement.</p>
    </div>
    <div class="toolbar dashboard-toolbar">
      <select class="range-select" id="dashboardPeriod" aria-label="Dashboard period">
        <option value="month">Monthly</option>
        <option value="year">Yearly</option>
      </select>
      <select class="range-select" id="dashboardFinancialYear" aria-label="Dashboard financial year">
        <option value="">All FY</option>
      </select>
      <input class="range-input" type="month" id="dashboardMonth" aria-label="Dashboard month">
      <input class="range-input hidden" type="number" min="2020" max="2100" id="dashboardYear" aria-label="Dashboard year">
      <button class="btn primary" type="button" id="refreshDashboardBtn">Refresh</button>
    </div>
  </div>
  <div class="stat-grid compact" id="dashboardStats"></div>
  <div class="dashboard-grid">
    <section class="dashboard-panel">
      <div class="panel-header">
        <h2>Monthly Sales vs Expenses</h2>
        <div class="chart-legend"><span><i class="legend revenue"></i>Revenue</span><span><i class="legend expense"></i>Expenses</span></div>
      </div>
      <div class="chart-shell" id="salesExpenseChart"></div>
      <div class="chart-legend bottom"><span><i class="legend revenue"></i>Revenue</span><span><i class="legend expense"></i>Expenses</span></div>
    </section>
    <section class="dashboard-panel">
      <div class="panel-header">
        <h2>Monthly Production Quantity</h2>
        <div class="chart-legend"><span><i class="legend production"></i>OK Qty</span></div>
      </div>
      <div class="chart-shell" id="productionChart"></div>
    </section>
    <section class="dashboard-panel wide">
      <div class="panel-header">
        <h2>Client-wise Sales</h2>
        <div class="chart-legend"><span><i class="legend sales"></i>Invoice Amount</span></div>
      </div>
      <div class="chart-shell" id="clientSalesChart"></div>
    </section>
  </div>
  <section class="dashboard-panel wide">
    <div class="panel-header">
      <h2>Expense Breakdown</h2>
      <div class="chart-legend"><span><i class="legend expense"></i>Expense Distribution</span></div>
    </div>
    <div class="pie-chart-grid">
      <div class="chart-shell" id="expenseBreakdownChart"></div>
      <div class="pie-chart-legend" id="expenseBreakdownLegend"></div>
    </div>
  </section>
  <section class="dashboard-panel wide">
    <div class="panel-header">
      <h2>Notifications</h2>
    </div>
    <div class="table-wrap simple-table">
      <table>
        <thead>
          <tr>
            <th>Type</th>
            <th>Reference</th>
            <th>Due Date</th>
            <th>Status</th>
          </tr>
        </thead>
        <tbody id="dashboardNotifications"></tbody>
      </table>
    </div>
  </section>
  <div id="chartTooltip" class="chart-tooltip hidden"></div>
</section>
